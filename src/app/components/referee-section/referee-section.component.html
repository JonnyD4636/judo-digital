<div class="referee-section">
  <div class="level-card" *ngFor="let card of cards; trackBy: trackByTitle">
    <div class="level-card__header">{{ card.title }}</div>

    <div class="level-card__body">
      <div class="badge" aria-label="Badge">
        <div class="badge__inner" [class.badge__inner--image]="!!card.badgeImage">
          <ng-container *ngIf="card.badgeImage; else badgeText">
            <img class="badge__image" [src]="card.badgeImage" [alt]="card.badgeLabel" style="width: 100%; height: auto;" />
          </ng-container>
          <ng-template #badgeText>
            <div class="badge__brand">BRITISH JUDO</div>
            <div class="badge__label">{{ card.badgeLabel }}</div>
          </ng-template>
        </div>
      </div>

      <div class="metrics">
<ng-container *ngIf="card.currencyPercent > 0 && card.badgeImage !== 'assets/images/badges/plain-badge.png'">
        <div class="metric">
          <div class="metric__label">CURRENCY</div>
          <div class="bar" aria-label="Currency">
            <div class="bar__fill" [style.width.%]="card.currencyPercent"></div>
            <div class="bar__knob" [style.left.%]="card.currencyPercent"></div>
          </div>
        </div>
      </ng-container>
      <ng-container *ngIf="card.badgeImage === 'assets/images/badges/plain-badge.png'">
        <div class="metric">
          <div class="metric__label">No Qualification Held</div>
        </div>
      </ng-container>
      <ng-container *ngIf="card.badgeImage === 'assets/images/badges/plain-badge.png'">
        <div class="metric">
          <div class="metric__label">No Qualification Held</div>
        </div>
      </ng-container>

      <ng-container *ngIf="card.badgeImage !== 'assets/images/badges/plain-badge.png'">
        <div class="metric">
          <div class="metric__label">CURRENCY</div>
          <div class="bar" aria-label="Currency">
            <div class="bar__fill" [style.width.%]="card.currencyPercent"></div>
            <div class="bar__knob" [style.left.%]="card.currencyPercent"></div>
          </div>
        </div>
      </ng-container>
        <div class="metric">
          <div class="metric__label">PROGRESSION</div>
          <div class="progress" aria-label="Progression">
            <div class="progress__fill" [style.width.%]="card.progressionPercent"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
